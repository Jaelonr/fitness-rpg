openapi: 3.1.0
info:
  title: Ascension Quest API
  version: 0.1.0
  description: "Ascension Quest: Legends of Aethoria API"
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: player
  - name: nutrition
  - name: training
  - name: equipment
  - name: skills
  - name: quests
  - name: inventory
  - name: store
  - name: analytics
  - name: dashboard
  - name: guild

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Full dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ─── PLAYER ──────────────────────────────────────────────────────────────────
  /player:
    get:
      operationId: getPlayer
      tags: [player]
      summary: Get player profile
      responses:
        "200":
          description: Player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    patch:
      operationId: updatePlayer
      tags: [player]
      summary: Update player profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /player/setup:
    post:
      operationId: setupPlayer
      tags: [player]
      summary: Initial character setup — sets name, stat bonuses, and unlocks equipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerSetupInput"
      responses:
        "200":
          description: Player after setup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /player/allocate-stats:
    post:
      operationId: allocateStats
      tags: [player]
      summary: Allocate free stat points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatAllocation"
      responses:
        "200":
          description: Updated player stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /player/change-class:
    post:
      operationId: changeClass
      tags: [player]
      summary: Change base class for 5,000 gold
      responses:
        "200":
          description: Updated player after class change
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  player:
                    $ref: "#/components/schemas/Player"
                  goldSpent:
                    type: integer

  /player/respec:
    post:
      operationId: respecPlayer
      tags: [player]
      summary: Reset stat allocation for gold or Respec Scroll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  enum: [gold, scroll]
              required: [method]
      responses:
        "200":
          description: Updated player after respec
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  player:
                    $ref: "#/components/schemas/Player"
                  pointsReturned:
                    type: integer

  /player/reset:
    post:
      operationId: resetPlayer
      tags: [player]
      summary: Reset all player progress and return to character creation
      responses:
        "200":
          description: Player reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /player/titles:
    get:
      operationId: getPlayerTitles
      tags: [player]
      summary: Get earned titles
      responses:
        "200":
          description: List of earned titles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Title"

  /player/titles/{id}/equip:
    post:
      operationId: equipTitle
      tags: [player]
      summary: Equip a title
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /player/achievements:
    get:
      operationId: getAchievements
      tags: [player]
      summary: Get achievements
      responses:
        "200":
          description: List of achievements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"

  # ─── NUTRITION ────────────────────────────────────────────────────────────────
  /nutrition/targets:
    get:
      operationId: getNutritionTargets
      tags: [nutrition]
      summary: Get nutrition targets
      responses:
        "200":
          description: Nutrition targets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionTargets"
    patch:
      operationId: updateNutritionTargets
      tags: [nutrition]
      summary: Update nutrition targets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NutritionTargets"
      responses:
        "200":
          description: Updated targets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionTargets"

  /nutrition/today:
    get:
      operationId: getTodayNutrition
      tags: [nutrition]
      summary: Get today's nutrition summary
      responses:
        "200":
          description: Today nutrition summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyNutritionSummary"

  /nutrition/logs:
    get:
      operationId: getNutritionLogs
      tags: [nutrition]
      summary: Get nutrition logs
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Nutrition logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NutritionLog"
    post:
      operationId: createNutritionLog
      tags: [nutrition]
      summary: Log a meal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NutritionLogInput"
      responses:
        "201":
          description: Created log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionLog"

  /nutrition/logs/{id}:
    patch:
      operationId: updateNutritionLog
      tags: [nutrition]
      summary: Update a nutrition log entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NutritionLogUpdate"
      responses:
        "200":
          description: Updated log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionLog"
    delete:
      operationId: deleteNutritionLog
      tags: [nutrition]
      summary: Delete a nutrition log entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /nutrition/meals/saved:
    get:
      operationId: getSavedMeals
      tags: [nutrition]
      summary: List saved meals
      responses:
        "200":
          description: Saved meals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedMeal"
    post:
      operationId: createSavedMeal
      tags: [nutrition]
      summary: Save a meal template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedMealInput"
      responses:
        "201":
          description: Saved meal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedMeal"

  /nutrition/meals/saved/{id}:
    delete:
      operationId: deleteSavedMeal
      tags: [nutrition]
      summary: Delete a saved meal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /nutrition/copy-yesterday:
    post:
      operationId: copyYesterdayMeals
      tags: [nutrition]
      summary: Copy yesterday's meals to today
      responses:
        "200":
          description: Copied meals count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyMealsResult"

  /nutrition/weekly-averages:
    get:
      operationId: getNutritionWeeklyAverages
      tags: [nutrition]
      summary: Get weekly nutrition averages
      responses:
        "200":
          description: Weekly averages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyNutritionAverages"

  /nutrition/weight:
    get:
      operationId: getWeightEntries
      tags: [nutrition]
      summary: Get weight log entries
      responses:
        "200":
          description: Weight entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeightEntry"
    post:
      operationId: createWeightEntry
      tags: [nutrition]
      summary: Log body weight
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeightEntryInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"

  # ─── TRAINING ─────────────────────────────────────────────────────────────────
  /training/exercises:
    get:
      operationId: getExercises
      tags: [training]
      summary: List exercises
      parameters:
        - name: equipmentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: muscleGroup
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"

  /training/templates:
    get:
      operationId: getWorkoutTemplates
      tags: [training]
      summary: List workout templates
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutTemplate"
    post:
      operationId: createWorkoutTemplate
      tags: [training]
      summary: Create workout template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutTemplateInput"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutTemplate"

  /training/templates/{id}:
    get:
      operationId: getWorkoutTemplate
      tags: [training]
      summary: Get a workout template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutTemplate"
    patch:
      operationId: updateWorkoutTemplate
      tags: [training]
      summary: Update workout template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutTemplateUpdate"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutTemplate"
    delete:
      operationId: deleteWorkoutTemplate
      tags: [training]
      summary: Delete workout template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /training/sessions:
    get:
      operationId: getWorkoutSessions
      tags: [training]
      summary: List workout sessions
      parameters:
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutSession"
    post:
      operationId: createWorkoutSession
      tags: [training]
      summary: Start a workout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutSessionInput"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSession"

  /training/sessions/{id}:
    get:
      operationId: getWorkoutSession
      tags: [training]
      summary: Get a workout session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSession"
    patch:
      operationId: updateWorkoutSession
      tags: [training]
      summary: Update/complete a workout session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutSessionUpdate"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSession"

  /training/sessions/{id}/sets:
    post:
      operationId: logSet
      tags: [training]
      summary: Log a set in a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutSetInput"
      responses:
        "201":
          description: Logged set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSet"

  /training/sessions/{id}/sets/{setId}:
    patch:
      operationId: updateSet
      tags: [training]
      summary: Update a logged set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: setId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutSetUpdate"
      responses:
        "200":
          description: Updated set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSet"
    delete:
      operationId: deleteSet
      tags: [training]
      summary: Delete a logged set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: setId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /training/prs:
    get:
      operationId: getPersonalRecords
      tags: [training]
      summary: Get PR history
      responses:
        "200":
          description: PRs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonalRecord"

  # ─── EQUIPMENT ────────────────────────────────────────────────────────────────
  /equipment:
    get:
      operationId: getEquipment
      tags: [equipment]
      summary: List equipment
      responses:
        "200":
          description: Equipment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Equipment"
    post:
      operationId: addEquipment
      tags: [equipment]
      summary: Add equipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentInput"
      responses:
        "201":
          description: Added equipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Equipment"

  /equipment/{id}:
    patch:
      operationId: updateEquipment
      tags: [equipment]
      summary: Update equipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentUpdate"
      responses:
        "200":
          description: Updated equipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Equipment"
    delete:
      operationId: deleteEquipment
      tags: [equipment]
      summary: Remove equipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── SKILLS ──────────────────────────────────────────────────────────────────
  /skills/trees:
    get:
      operationId: getSkillTrees
      tags: [skills]
      summary: Get all skill trees with nodes
      responses:
        "200":
          description: Skill trees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillTree"

  /skills/nodes/{id}/unlock:
    post:
      operationId: unlockSkillNode
      tags: [skills]
      summary: Unlock a skill node
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unlocked node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillNode"

  # ─── QUESTS ──────────────────────────────────────────────────────────────────
  /quests:
    get:
      operationId: getQuests
      tags: [quests]
      summary: List quests
      parameters:
        - name: type
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Quests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quest"

  /quests/daily:
    get:
      operationId: getDailyQuest
      tags: [quests]
      summary: Get today's daily quest
      responses:
        "200":
          description: Daily quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"

  /quests/{id}:
    get:
      operationId: getQuest
      tags: [quests]
      summary: Get a quest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"

  /quests/{id}/complete-task:
    post:
      operationId: completeQuestTask
      tags: [quests]
      summary: Mark a quest task as complete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestTaskCompletion"
      responses:
        "200":
          description: Updated quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"

  /quests/{id}/claim:
    post:
      operationId: claimQuestReward
      tags: [quests]
      summary: Claim quest rewards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Claim result with rewards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestClaimResult"

  # ─── INVENTORY ────────────────────────────────────────────────────────────────
  /inventory:
    get:
      operationId: getInventory
      tags: [inventory]
      summary: Get player inventory
      responses:
        "200":
          description: Inventory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /inventory/{id}/use:
    post:
      operationId: useInventoryItem
      tags: [inventory]
      summary: Use an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Use result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UseItemResult"

  # ─── STORE ────────────────────────────────────────────────────────────────────
  /store/items:
    get:
      operationId: getStoreItems
      tags: [store]
      summary: List store items
      responses:
        "200":
          description: Store items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoreItem"

  /store/purchase:
    post:
      operationId: purchaseStoreItem
      tags: [store]
      summary: Purchase a store item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInput"
      responses:
        "200":
          description: Purchase result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseResult"

  # ─── ANALYTICS ────────────────────────────────────────────────────────────────
  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Analytics overview
      responses:
        "200":
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /analytics/volume:
    get:
      operationId: getVolumeByMuscleGroup
      tags: [analytics]
      summary: Training volume by muscle group
      parameters:
        - name: weeks
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Volume data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MuscleGroupVolume"

  /analytics/xp:
    get:
      operationId: getXpByCategory
      tags: [analytics]
      summary: XP earned by category
      responses:
        "200":
          description: XP data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/XpCategory"

  /analytics/rank-progress:
    get:
      operationId: getRankProgress
      tags: [analytics]
      summary: Rank progress over time
      responses:
        "200":
          description: Rank progress
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RankProgressEntry"

  # ─── EXERCISES ───────────────────────────────────────────────────────────────
  /exercises:
    get:
      operationId: listExercises
      tags: [training]
      summary: List all exercises with optional search
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"

  /exercises/search-ai:
    post:
      operationId: searchExercisesAi
      tags: [training]
      summary: Search for exercises using AI and save new ones to the database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
      responses:
        "200":
          description: Matching exercises (from DB or AI)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseSearchResult"

  # ─── PROFILE / BIOMETRICS ───────────────────────────────────────────────────
  /profile/biometrics:
    get:
      operationId: getBiometrics
      tags: [player]
      summary: Get player biometric profile
      responses:
        "200":
          description: Player biometrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerBiometrics"
    put:
      operationId: updateBiometrics
