            application/json:
              schema:
                $ref: "#/components/schemas/BossRaid"

  /boss-raids/{id}:
    get:
      operationId: getBossRaid
      tags: [quests]
      summary: Get a specific boss raid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Boss raid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BossRaid"

  /boss-raids/{id}/task:
    patch:
      operationId: updateBossRaidTask
      tags: [quests]
      summary: Update a raid task progress
      parameters:
        - name: id
