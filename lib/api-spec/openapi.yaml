          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId]
              properties:
                taskId:
                  type: string
                currentValue:
                  type: ["number", "null"]
                completed:
                  type: ["boolean", "null"]
      responses:
        "200":
          description: Updated raid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BossRaid"

  /boss-raids/{id}/claim:
    post:
      operationId: claimBossRaidReward
      tags: [quests]
      summary: Claim a completed boss raid reward
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Claim result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaidClaimResult"

  /armory:
    get:
      operationId: getArmory
      tags: [armory]
      summary: Get player's RPG gear
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of gear items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RpgGear"

  /armory/{id}/equip:
    post:
      operationId: equipGear
      tags: [armory]
      summary: Equip or unequip a gear item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Equip status updated
          content:
            application/json:
              schema:
                type: object
                required: [id, equipped, slot]
                properties:
                  id:
                    type: integer
                  equipped:
                    type: boolean
                  slot:
                    type: string

  /nutrition/food-search:
    get:
      operationId: searchFood
      tags: [nutrition]
      summary: Search food database (Open Food Facts)
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Food search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodSearchResult"

  /player/daily-reward:
    get:
      operationId: getDailyReward
      tags: [player]
      summary: Get daily login reward status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daily reward status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRewardStatus"

  /player/daily-reward/claim:
    post:
      operationId: claimDailyReward
      tags: [player]
      summary: Claim today's daily login reward
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reward claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRewardClaimResult"

  /guilds/mine:
    get:
      operationId: getMyGuild
      tags: [guilds]
      summary: Get the current player's guild
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Guild or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildDetail"
                nullable: true

  /guilds:
    post:
      operationId: createGuild
      tags: [guilds]
      summary: Create a new guild
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                emblem:
                  type: string
      responses:
        "201":
          description: Guild created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guild"

  /guilds/join:
    post:
      operationId: joinGuild
      tags: [guilds]
      summary: Join a guild by invite code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inviteCode]
              properties:
                inviteCode:
                  type: string
      responses:
        "200":
          description: Joined successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  guildId:
                    type: integer
                  guildName:
                    type: string

  /guilds/leave:
    post:
      operationId: leaveGuild
      tags: [guilds]
      summary: Leave current guild
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Left guild
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  guildDisbanded:
                    type: boolean

  /push/vapid-public-key:
    get:
      operationId: getVapidPublicKey
      tags: [push]
      summary: Get VAPID public key for push subscription
      security:
        - bearerAuth: []
      responses:
        "200":
          description: VAPID public key
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string

  /push/subscribe:
    post:
      operationId: subscribePush
      tags: [push]
      summary: Register a push notification subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint, keys]
              properties:
                endpoint:
                  type: string
                keys:
                  type: object
                  properties:
                    p256dh:
                      type: string
                    auth:
                      type: string
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
    delete:
      operationId: unsubscribePush
      tags: [push]
      summary: Remove push notification subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint:
                  type: string
      responses:
        "200":
          description: Unsubscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /guild-master/conversation:
    get:
      operationId: getGuildMasterConversation
      tags: [guild]
      summary: Get or create the Guild Master conversation for the authenticated player
      responses:
        "200":
          description: Conversation with message history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildMasterConversation"

  /guild-master/messages:
    post:
      operationId: sendGuildMasterMessage
      tags: [guild]
      summary: Send message to the Guild Master (SSE streaming response)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuildMasterMessageInput"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  /guild-master/campaign-quests:
    get:
      operationId: getGuildMasterCampaignQuests
      tags: [guild]
      summary: Get campaign quest status records for the authenticated player
      responses:
        "200":
          description: Campaign quest status records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignQuestStatus"

  /battle-log:
    get:
      operationId: getBattleLog
      tags: [training]
      summary: Get combat replay history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Battle log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CombatReplayEntry"

  /player/style-identity:
    get:
      operationId: getPlayerStyleIdentity
      tags: [player]
      summary: Get player combat style identity
      responses:
        "200":
          description: Style identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StyleIdentity"

  /store/sections:
    get:
      operationId: getStoreSections
      tags: [store]
      summary: Get store items grouped by section
      responses:
        "200":
          description: Store sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSections"

  /chronicle/summary:
    get:
      operationId: getChronicleSummary
      tags: [chronicle]
      summary: Get the complete Chronicle hub summary
      responses:
        "200":
          description: Chronicle summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChronicleSummary"

  /character/summary:
    get:
      operationId: getCharacterSummary
      tags: [character]
      summary: Get unified character identity summary
      responses:
        "200":
          description: Character summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterSummary"

  /guild-hall/today:
    get:
      operationId: getGuildHallToday
      tags: [guild]
      summary: Get the complete daily Guild Hall snapshot
      responses:
        "200":
          description: Daily Guild Hall state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildHallSnapshot"

  /guild-hall/report:
    post:
      operationId: reportToGuildMaster
      tags: [guild]
      summary: Report daily commission progress and claim earned rewards idempotently
      responses:
        "200":
          description: Guild report result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildHallReportResult"

  /guild-hall/consequences/{id}/restoration:
    post:
      operationId: startRestorationQuest
      tags: [guild]
      summary: Begin an available restoration campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Restoration quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"

  /health/import:
    post:
      operationId: importHealthData
      tags: [health]
      summary: Import deduplicated Apple Health or Health Connect records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthImportBatch"
      responses:
        "200":
          description: Health import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthImportResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── DASHBOARD ─────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [player, dailyQuest, nutrition, workoutRecommendation]
      properties:
        player:
          $ref: "#/components/schemas/Player"
        dailyQuest:
          $ref: "#/components/schemas/Quest"
        nutrition:
          $ref: "#/components/schemas/DailyNutritionSummary"
        workoutRecommendation:
          $ref: "#/components/schemas/WorkoutRecommendation"
        streakDays:
          type: integer
        lastWorkoutDaysAgo:
          type: ["integer", "null"]

    WorkoutRecommendation:
      type: object
      required: [templateId, templateName, reason]
      properties:
        templateId:
          type: integer
        templateName:
          type: string
        reason:
          type: string

    # ─── PLAYER ────────────────────────────────────────────────────────────────
    Player:
      type: object
      required: [id, name, level, rank, xp, xpToNextLevel, hp, maxHp, mp, maxMp, gold, freeStatPoints, stats, activeTitle, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        level:
          type: integer
        rank:
          type: string
          enum: [E, D, C, B, A, S, "National-Level"]
        xp:
          type: integer
        xpToNextLevel:
          type: integer
        hp:
          type: integer
        maxHp:
          type: integer
        mp:
          type: integer
        maxMp:
          type: integer
        gold:
          type: integer
        freeStatPoints:
          type: integer
        streakDays:
          type: integer
        stats:
          $ref: "#/components/schemas/PlayerStats"
        activeTitle:
          type: ["string", "null"]
        penaltyQuestActive:
          type: boolean
        baseClass:
          type: ["string", "null"]
        setupCompleted:
          type: boolean
        createdAt:
          type: string

    PlayerStats:
      type: object
      required: [strength, agility, stamina, vitality, discipline, sense]
      properties:
        strength:
          type: integer
        agility:
          type: integer
        stamina:
          type: integer
        vitality:
          type: integer
        discipline:
          type: integer
        sense:
          type: integer

    PlayerSetupInput:
      type: object
      required: [name, statBonuses, equipmentIds]
      properties:
        name:
          type: string
        statBonuses:
          $ref: "#/components/schemas/PlayerStats"
        equipmentIds:
          type: array
          items:
            type: integer
        baseClass:
          type: string
        goal:
          type: string
        systemScan:
          type: object
          additionalProperties: false
          properties:
            ageYears:
              type: integer
            sex:
              type: string
              enum: [male, female, other]
            heightCm:
              type: number
              nullable: true
            weightKg:
              type: number
              nullable: true
            activityLevel:
              type: string
              enum: [sedentary, light, moderate, active, very_active]
            weightGoal:
              type: string
              enum: [lose, maintain, gain]
            equipmentTypes:
              type: array
              items:
                type: string

    PlayerUpdate:
      type: object
      properties:
        name:
          type: string

    StatAllocation:
      type: object
      required: [allocations]
      properties:
        allocations:
          $ref: "#/components/schemas/PlayerStats"

    Title:
      type: object
      required: [id, name, description, rarity, equipped]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
        equipped:
          type: boolean

    Achievement:
      type: object
      required: [id, name, description, category, unlockedAt, xpReward]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
        unlockedAt:
          type: ["string", "null"]
        xpReward:
          type: integer
        unlocked:
          type: boolean
        checkKey:
          type: string
          nullable: true
        checkThreshold:
          type: integer
          nullable: true
        unlockCondition:
          type: string
          nullable: true

    # ─── NUTRITION ─────────────────────────────────────────────────────────────
    NutritionTargets:
      type: object
      required: [calories, protein, carbs, fat]
      properties:
        calories:
          type: integer
        protein:
          type: integer
        carbs:
          type: integer
        fat:
          type: integer
        sex:
          type: string
          enum: [male, female]
          nullable: true
        ageYears:
          type: integer
          nullable: true
        activityLevel:
          type: string
          enum: [sedentary, light, moderate, active, very_active]
          nullable: true
        weightGoal:
          type: string
          enum: [lose, maintain, gain]
          nullable: true
        autoCalc:
          type: boolean

    DailyNutritionSummary:
      type: object
      required: [date, totalCalories, totalProtein, totalCarbs, totalFat, targetCalories, targetProtein, targetCarbs, targetFat, entries]
      properties:
        date:
          type: string
        totalCalories:
          type: integer
        totalProtein:
          type: number
        totalCarbs:
          type: number
        totalFat:
          type: number
        targetCalories:
          type: integer
        targetProtein:
          type: integer
        targetCarbs:
          type: integer
        targetFat:
          type: integer
        remainingCalories:
          type: integer
        entries:
          type: array
          items:
            $ref: "#/components/schemas/NutritionLog"

    NutritionLog:
      type: object
      required: [id, date, mealName, calories, protein, carbs, fat, mealType, createdAt]
      properties:
        id:
          type: integer
        date:
          type: string
        mealName:
          type: string
        calories:
          type: integer
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack, pre_workout, post_workout]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    NutritionLogInput:
      type: object
      required: [mealName, calories, protein, carbs, fat, mealType]
      properties:
        date:
          type: ["string", "null"]
        mealName:
          type: string
        calories:
          type: integer
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack, pre_workout, post_workout]
        notes:
          type: ["string", "null"]

    NutritionLogUpdate:
      type: object
      properties:
        mealName:
          type: string
        calories:
          type: integer
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack, pre_workout, post_workout]
        notes:
          type: ["string", "null"]

    SavedMeal:
      type: object
      required: [id, name, calories, protein, carbs, fat]
      properties:
        id:
          type: integer
        name:
          type: string
        calories:
          type: integer
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        mealType:
          type: ["string", "null"]

    SavedMealInput:
      type: object
      required: [name, calories, protein, carbs, fat]
      properties:
        name:
          type: string
        calories:
          type: integer
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        mealType:
          type: ["string", "null"]

    CopyMealsResult:
      type: object
      required: [copied]
      properties:
        copied:
          type: integer

    WeeklyNutritionAverages:
      type: object
      required: [avgCalories, avgProtein, avgCarbs, avgFat, daysLogged]
      properties:
        avgCalories:
          type: number
        avgProtein:
          type: number
        avgCarbs:
          type: number
        avgFat:
          type: number
        daysLogged:
          type: integer
        dailyData:
          type: array
          items:
            $ref: "#/components/schemas/DailyNutritionStat"

    DailyNutritionStat:
      type: object
      required: [date, calories, protein, carbs, fat]
      properties:
        date:
          type: string
        calories:
          type: integer
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number

    WeightEntry:
      type: object
      required: [id, weight, date, unit]
      properties:
        id:
          type: integer
        weight:
          type: number
        date:
          type: string
        unit:
          type: string
          enum: [lbs, kg]
        notes:
          type: ["string", "null"]

    WeightEntryInput:
      type: object
      required: [weight, date, unit]
      properties:
        weight:
          type: number
        date:
          type: string
        unit:
          type: string
          enum: [lbs, kg]
        notes:
          type: ["string", "null"]

    # ─── TRAINING ──────────────────────────────────────────────────────────────
    Exercise:
      type: object
      required: [id, name, muscleGroup, category]
      properties:
        id:
          type: integer
        name:
          type: string
        muscleGroup:
          type: string
        category:
          type: string
          enum: [barbell, dumbbell, machine, bodyweight, cable, cardio, martial_arts]
        instructions:
          type: ["string", "null"]
        equipmentIds:
          type: array
          items:
            type: integer
        createdAt:
          type: string

    ExerciseSearchResult:
      type: object
      required: [source, exercises]
      properties:
        source:
          type: string
          enum: [database, ai, existing]
        exercises:
          type: array
          items:
            type: object
            required: [id, name, muscleGroup, category]
            properties:
              id:
                type: integer
              name:
                type: string
              muscleGroup:
                type: string
              category:
                type: string
              instructions:
                type: ["string", "null"]
              equipmentIds:
                type: array
                items:
                  type: integer
              source:
                type: string
              recommendedWeightKg:
                type: ["number", "null"]
              createdAt:
                type: string

    WorkoutTemplate:
      type: object
      required: [id, name, category, exercises, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum: [strength, conditioning, striking, grappling, recovery, mixed]
        description:
          type: ["string", "null"]
        exercises:
