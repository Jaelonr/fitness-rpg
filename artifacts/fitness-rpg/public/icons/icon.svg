<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0a0a0f"/>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0080a0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shield body -->
  <path d="M256 90 L380 140 L380 270 Q380 360 256 420 Q132 360 132 270 L132 140 Z" fill="#0d1a2e" stroke="#00e5ff" stroke-width="4" opacity="0.9"/>
  <path d="M256 110 L365 155 L365 270 Q365 348 256 402 Q147 348 147 270 L147 155 Z" fill="url(#blade)" opacity="0.15"/>
  <!-- Sword vertical -->
  <rect x="248" y="130" width="16" height="220" rx="8" fill="url(#blade)" filter="url(#glow)"/>
  <!-- Sword crossguard -->
  <rect x="208" y="220" width="96" height="14" rx="7" fill="#00e5ff" filter="url(#glow)"/>
  <!-- Sword handle -->
  <rect x="251" y="340" width="10" height="50" rx="5" fill="#5588aa"/>
  <!-- Center gem -->
  <circle cx="256" cy="190" r="12" fill="#00e5ff" opacity="0.9" filter="url(#glow)"/>
  <!-- XP bar at bottom -->
  <rect x="170" y="450" width="172" height="8" rx="4" fill="#1a2a3a"/>
  <rect x="170" y="450" width="120" height="8" rx="4" fill="#00e5ff" opacity="0.8"/>
</svg>
