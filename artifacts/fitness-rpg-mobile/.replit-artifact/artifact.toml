kind = "mobile"
previewPath = "/mobile/"
title = "Fitness RPG — Mobile"
version = "1.0.0"
id = "artifacts/fitness-rpg-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20167

[services.development]
run = "pnpm --filter @workspace/fitness-rpg-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fitness-rpg-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/fitness-rpg-mobile", "run", "serve" ]

[services.env]
PORT = "20167"
BASE_PATH = "/mobile/"
